apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "marketpay.fullname" . }}-backend
  labels:
    app: backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            - name: STELLAR_NETWORK
              value: {{ .Values.backend.env.STELLAR_NETWORK | quote }}
            - name: HORIZON_URL
              value: {{ .Values.backend.env.HORIZON_URL | quote }}
            - name: REDIS_URL
              value: "redis://{{ include "marketpay.fullname" . }}-redis:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "marketpay.fullname" . }}-backend
  labels:
    app: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: backend
