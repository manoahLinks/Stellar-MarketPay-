# docker-compose.loadtest.yml
#
# Self-contained, production-like stack used by the weekly k6 load-test
# workflow (.github/workflows/load-test.yml) and by local runs.
#
# Spin everything up, seed data, then drive the API with k6:
#
#   docker compose -f docker-compose.loadtest.yml up -d
#   node k6/seed-data.js                       # populates test-fixtures.json
#   docker run --rm --network host \
#     -v "$PWD":/work -w /work \
#     grafana/k6 run /work/k6/get-jobs.js
#   docker compose -f docker-compose.loadtest.yml down -v
#
# Notable tuning vs. docker-compose.yml:
#   • RATE_LIMIT_SCALE=1000 — relaxes per-IP rate limits so synthetic load is
#     not throttled (production keeps strict limits; default scale = 1).
#   • DB_POOL_MAX=50         — wider PG pool so 100 concurrent VUs do not queue.
#   • ALLOWED_ORIGINS=*      — the k6 runner is not a browser origin.
#   • backend runs `npm start` (production mode), not `npm run dev`.

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: stellarwork
      POSTGRES_PASSWORD: stellarwork_dev
      POSTGRES_DB: stellarwork
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stellarwork -d stellarwork"]
      interval: 5s
      timeout: 5s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: "4000"
      # NOTE: deliberately NOT "production" — the pg pool enforces SSL
      # (rejectUnauthorized) only when NODE_ENV === "production", and the
      # load-test Postgres container has no TLS configured.
      NODE_ENV: development
      DATABASE_URL: postgresql://stellarwork:stellarwork_dev@postgres:5432/stellarwork
      REDIS_URL: redis://redis:6379
      JWT_SECRET: loadtest-jwt-secret-with-sufficient-length-for-signing
      STELLAR_NETWORK: testnet
      HORIZON_URL: https://horizon-testnet.stellar.org
      ALLOWED_ORIGINS: "*"
      BASE_URL: http://localhost:4000
      # ── load-test tuning (see header comment) ──
      RATE_LIMIT_SCALE: "1000"
      DB_POOL_MAX: "50"
    command: ["node", "src/server.js"]
