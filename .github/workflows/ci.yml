name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    name: Secrets Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          version: latest
          config-path: .gitleaks.toml
          verbose: true

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    needs: secrets-scan
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true
      - run: npm test
      - run: npm run type-check
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_USE_CONTRACT_MOCK: "true"
          NEXT_PUBLIC_CONTRACT_ID: "CMOCKCONTRACTID"
          SKIP_API_CALLS: "true"
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_USE_CONTRACT_MOCK: "true"
          NEXT_PUBLIC_CONTRACT_ID: CMOCKCONTRACTID
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  backend:
    name: Backend (Node.js)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: marketpay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    needs: secrets-scan
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true
      - run: npm test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/marketpay_test
          JWT_SECRET: ci-test-jwt-secret-with-sufficient-length
      - run: npm run lint
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  contracts:
    name: Soroban Contract (Rust)
    runs-on: ubuntu-latest
    needs: secrets-scan
    defaults:
      run:
        working-directory: contracts/marketpay-contract
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo check --target wasm32-unknown-unknown
      - run: cargo clippy -- -D warnings
      - run: cargo install cargo-audit --locked
      - run: cargo audit --ignore RUSTSEC-2020-0071
      - run: cargo test
      - run: cargo build --target wasm32-unknown-unknown --release